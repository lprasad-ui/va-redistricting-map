<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virginia Congressional Districts: Current vs Proposed 2026</title>
<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f2efe8;
  --surface: #ffffff;
  --surface2: #ece9e1;
  --border: #d8d4ca;
  --text: #1a1814;
  --muted: #7a7568;
  --accent: #2a5fa8;
  --shadow: rgba(0,0,0,0.07);
  --divider: #b0a898;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

/* ── Mode toggle bar ── */
.mode-bar {
  height: 52px; background: var(--surface); border-bottom: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 2px 6px var(--shadow); position: relative; z-index: 100;
  padding: 0 16px;
}
.tool-btn {
  height: 36px; padding: 0 18px; border-radius: 20px; border: 2px solid var(--border);
  background: var(--surface2); color: var(--muted); font-family: 'Inter', sans-serif;
  font-size: 0.82rem; font-weight: 600; cursor: pointer; display: flex; align-items: center;
  gap: 6px; transition: all 0.18s; white-space: nowrap; letter-spacing: 0.01em;
}
.tool-btn:hover { border-color: var(--accent); color: var(--accent); background: #eef3fc; }
.tool-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

/* ── Maps container ── */
.maps-container {
  height: calc(100vh - 52px - 42px);
  display: grid;
  grid-template-columns: 1fr 4px 1fr;
}

/* ── Map panel ── */
.map-panel { position: relative; overflow: hidden; background: #c8ddf0; }

.map-divider {
  background: var(--divider); position: relative; z-index: 50;
  display: flex; align-items: center; justify-content: center;
}
.map-divider::before {
  content: '◆'; font-size: 8px; color: var(--surface);
  background: var(--divider); padding: 3px 0; line-height: 1;
}

.map-svg { width: 100%; height: 100%; display: block; cursor: grab; }
.map-svg:active { cursor: grabbing; }
.lens-active .map-svg { cursor: crosshair; }

.district-path { stroke-linejoin: round; stroke-linecap: round; }

/* ── Map title ── */
.map-title {
  position: absolute; top: 0; left: 0; right: 0; z-index: 20;
  text-align: center; padding: 10px 8px 0; pointer-events: none;
}
.map-title .label {
  font-family: 'Lora', serif; font-size: 1.5rem; font-weight: 700;
  color: var(--text); line-height: 1.2;
  text-shadow: 0 1px 4px rgba(255,255,255,0.8);
}
.map-title .sub {
  font-size: 0.72rem; color: var(--muted); margin-top: 2px; letter-spacing: 0.02em;
  text-shadow: 0 1px 3px rgba(255,255,255,0.9);
}

/* ── Zoom controls ── */
.zoom-ctrl {
  position: absolute; bottom: 14px; left: 10px; z-index: 20;
  display: flex; flex-direction: column; gap: 3px;
}
.zoom-btn {
  width: 30px; height: 30px; background: white; border: 1.5px solid var(--border);
  border-radius: 6px; cursor: pointer; font-size: 1.1rem; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 1px 4px var(--shadow); transition: all 0.12s; user-select: none;
}
.zoom-btn:hover { color: var(--accent); border-color: var(--accent); }

/* ── District labels ── */
.district-label {
  font-family: 'Inter', sans-serif; font-weight: 800;
  fill: #fff; pointer-events: none; text-anchor: middle; dominant-baseline: central;
  paint-order: stroke; stroke: rgba(0,0,0,0.35); stroke-width: 3.5px;
}

/* ── Lens overlay ── */
.lens-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 15; pointer-events: none;
}
.lens-active .lens-overlay { pointer-events: all; cursor: crosshair; }
.lens-ring { fill: none; stroke: var(--accent); stroke-width: 2.5; filter: drop-shadow(0 0 5px rgba(42,95,168,0.35)); }
.lens-crosshair { stroke: rgba(42,95,168,0.4); stroke-width: 1; stroke-dasharray: 3,4; }

/* ── Lens card ── */
.lens-card {
  position: absolute; z-index: 30; background: white; border: 1.5px solid var(--border);
  border-radius: 10px; box-shadow: 0 6px 24px rgba(0,0,0,0.13);
  padding: 14px 16px; width: 220px; display: none; pointer-events: none;
  font-family: 'Inter', sans-serif;
}
.lens-card.show { display: block; }
.lc-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
.lc-title { font-family: 'Lora', serif; font-size: 1rem; font-weight: 700; color: var(--text); }
.lc-pop { font-size: 0.64rem; color: var(--muted); }
.lc-sec { font-size: 0.62rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; margin-top: 2px; }
.race-row { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.race-lbl { font-size: 0.64rem; width: 55px; flex-shrink: 0; color: var(--text); }
.race-track { flex: 1; height: 7px; background: #eee; border-radius: 4px; overflow: hidden; }
.race-fill { height: 100%; border-radius: 4px; }
.race-pct { font-size: 0.62rem; color: var(--muted); width: 34px; text-align: right; flex-shrink: 0; }
.divider { height: 1px; background: var(--border); margin: 8px 0; }
.elex-row { display: flex; gap: 5px; margin-bottom: 4px; }
.vote-box { flex: 1; border-radius: 5px; padding: 5px 7px; text-align: center; }
.vote-box.d { background: #eef2fc; } .vote-box.r { background: #fceef0; }
.vb-party { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.04em; }
.d .vb-party { color: #2a5fa8; } .r .vb-party { color: #b03030; }
.vb-votes { font-size: 0.72rem; font-weight: 600; color: var(--text); }
.vb-pct { font-size: 0.6rem; color: var(--muted); }

.lens-hint {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.95); border: 1.5px solid var(--border);
  border-radius: 16px; padding: 4px 14px; font-size: 0.7rem; color: var(--muted);
  white-space: nowrap; box-shadow: 0 2px 6px var(--shadow); z-index: 20;
  pointer-events: none; transition: opacity 0.2s;
}

/* ── Status bar ── */
.status-bar {
  height: 42px; background: var(--surface); border-top: 2px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 10px;
  box-shadow: 0 -1px 4px var(--shadow); overflow-x: auto;
}
.s-sel { font-size: 0.76rem; color: var(--accent); font-weight: 600; white-space: nowrap; }
.s-space { flex: 1; min-width: 4px; }
.chips { display: flex; gap: 4px; flex-shrink: 0; }
.chip {
  font-size: 0.7rem; padding: 3px 9px; border-radius: 4px; border: 1.5px solid var(--border);
  color: var(--muted); cursor: pointer; transition: all 0.12s; user-select: none; font-weight: 600;
  white-space: nowrap;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.active { background: var(--accent); border-color: var(--accent); color: white; }

/* Tooltip */
.map-tooltip {
  position: fixed; z-index: 200; background: rgba(255,255,255,0.97);
  border: 1.5px solid var(--border); border-radius: 5px; padding: 5px 11px;
  font-size: 0.74rem; box-shadow: 0 2px 8px var(--shadow);
  pointer-events: none; display: none; white-space: nowrap; font-weight: 500;
}

/* ═══════════════════════════════════════════
   MOBILE: stack maps vertically
   ═══════════════════════════════════════════ */
@media (max-width: 768px) {
  .maps-container {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr 3px 1fr;
    height: calc(100vh - 52px - 38px);
  }
  .map-divider {
    width: 100%; height: 3px;
  }
  .map-divider::before { display: none; }
  .map-title .label { font-size: 1.2rem; }
  .map-title .sub { font-size: 0.65rem; }
  .zoom-ctrl { bottom: 8px; left: 6px; }
  .zoom-btn { width: 28px; height: 28px; font-size: 1rem; }
  .status-bar { height: 38px; padding: 0 10px; gap: 6px; }
  .chip { font-size: 0.65rem; padding: 2px 7px; }
  .s-sel { font-size: 0.7rem; }
  .lens-card { width: 190px; padding: 10px 12px; }
  .lc-title { font-size: 0.9rem; }
  .tool-btn { height: 32px; padding: 0 14px; font-size: 0.76rem; }
  .mode-bar { height: 46px; }
  .lens-hint { font-size: 0.62rem; padding: 3px 10px; }
}

@media (max-width: 420px) {
  .map-title .label { font-size: 1.05rem; }
  .tool-btn { height: 30px; padding: 0 12px; font-size: 0.72rem; }
  .mode-bar { height: 42px; gap: 6px; }
  .chip { font-size: 0.6rem; padding: 2px 5px; }
  .lens-card { width: 170px; padding: 8px 10px; }
}
</style>
</head>

<!-- Mode toggle replaces header -->
<div class="mode-bar">
  <button class="tool-btn" id="btn-select" onclick="setMode('select')">⬚ Select Districts</button>
  <button class="tool-btn active" id="btn-lens" onclick="setMode('lens')">🔍 Data Lens</button>
</div>

<div class="maps-container">

  <div class="map-panel" id="panel-current">

  <div class="map-divider"></div>

    <div class="lens-card" id="lens-card-proposed"></div>
    <div class="lens-hint" id="hint-proposed">🔍 Hover to explore demographics</div>
    <div class="zoom-ctrl">
      <div class="zoom-btn" onclick="zoomMap('proposed',1.3)">+</div>

      <div class="zoom-btn" onclick="resetZoom('proposed')" title="Reset">⟳</div>

</div>

<div class="status-bar">

</div>

<div class="map-tooltip" id="tooltip"></div>

dem": 189796, "gov25rep": 115379, "pres24dem": 228893, "pres24rep": 173183}};

const PAL = {
  '01': { fill:'#2e6db4', stroke:'#1a4d8a' },
  '02': { fill:'#2a8c56', stroke:'#1a6038' },
  '03': { fill:'#a02860', stroke:'#701840' },
  '04': { fill:'#6830a0', stroke:'#481870' },
  '05': { fill:'#b06020', stroke:'#804010' },
  '06': { fill:'#188888', stroke:'#0e6060' },
  '07': { fill:'#786010', stroke:'#504000' },
  '08': { fill:'#4820a0', stroke:'#301070' },
  '09': { fill:'#287040', stroke:'#185030' },
  '10': { fill:'#903030', stroke:'#601818' },
  '11': { fill:'#183a90', stroke:'#0e3070' },
};
const HL_FILL = '#f5c030', HL_STROKE = '#c89000';

const maps = {};
let selectedId = null;
let currentMode = 'lens';

function getLabelSize() {
  const w = window.innerWidth;
  if (w <= 420) return 16;
  if (w <= 768) return 18;
  return 15;
}

function initMap(side, geoData) {
  const svgEl = document.getElementById(`svg-${side}`);
  const svg = d3.select(svgEl);
  const W = svgEl.clientWidth, H = svgEl.clientHeight;
  const projection = d3.geoMercator().fitSize([W, H], geoData);
  const path = d3.geoPath().projection(projection);

  svg.append('rect').attr('width', W).attr('height', H).attr('fill', '#c8ddf0');

  const g = svg.append('g').attr('class', 'districts-g');

  g.selectAll('path')
    .data(geoData.features)
    .join('path')
    .attr('class', 'district-path')
    .attr('d', path)
    .attr('fill', d => PAL[d.properties.district]?.fill || '#888')
    .attr('fill-opacity', 0.58)
    .attr('stroke', d => PAL[d.properties.district]?.stroke || '#555')
    .attr('stroke-width', 1)
    .on('mouseover', function(event, d) {
      if (currentMode !== 'select') return;
      const id = d.properties.district;
      if (id !== selectedId) d3.select(this).attr('fill-opacity', 0.75).attr('stroke-width', 2);
      showTooltip(event, `District ${parseInt(id)}`);
    })
    .on('mousemove', (event) => { if (currentMode === 'select') moveTooltip(event); })
    .on('mouseout', function(event, d) {
      if (currentMode !== 'select') return;
      const id = d.properties.district;
      if (id !== selectedId) d3.select(this).attr('fill-opacity', 0.58).attr('stroke-width', 1);
      hideTooltip();
    })
    .on('click', function(event, d) {
      if (currentMode !== 'select') return;
      event.stopPropagation();
      selectDistrict(d.properties.district);
    });

  const fs = getLabelSize();
  g.selectAll('text')
    .data(geoData.features)
    .join('text')
    .attr('class', 'district-label')
    .attr('x', d => path.centroid(d)[0])
    .attr('y', d => path.centroid(d)[1])
    .attr('font-size', fs + 'px')
    .text(d => parseInt(d.properties.district));

  const zoom = d3.zoom()
    .scaleExtent([0.8, 12])
    .on('zoom', (event) => {
      g.attr('transform', event.transform);
      syncZoom(side, event.transform);
    });

  svg.call(zoom);
  svg.on('click.bg', () => { if (currentMode === 'select' && selectedId) selectDistrict(selectedId); });

  maps[side] = { svg, svgEl, g, projection, path, zoom, W, H, geoData };
}

let syncingZoom = false;
function syncZoom(fromSide, transform) {
  if (syncingZoom) return; syncingZoom = true;
  const toSide = fromSide === 'current' ? 'proposed' : 'current';
  if (maps[toSide]) maps[toSide].svg.call(maps[toSide].zoom.transform, transform);
  syncingZoom = false;
}
function zoomMap(side, factor) {
  if (!maps[side]) return;
  const { svg, zoom, W, H } = maps[side];
  svg.transition().duration(250).call(zoom.scaleBy, factor, [W/2, H/2]);
}
function resetZoom(side) {
  if (!maps[side]) return;
  maps[side].svg.transition().duration(300).call(maps[side].zoom.transform, d3.zoomIdentity);
}

function selectDistrict(id) {
  ['current','proposed'].forEach(side => {
    if (!maps[side]) return;
    maps[side].g.selectAll('path').each(function(d) {
      const did = d.properties.district;
      if (did === id) {
        d3.select(this).attr('fill', HL_FILL).attr('stroke', HL_STROKE)
          .attr('fill-opacity', 0.82).attr('stroke-width', 2.5).raise();
      } else if (did === selectedId) {
        d3.select(this).attr('fill', PAL[did]?.fill || '#888')
          .attr('stroke', PAL[did]?.stroke || '#555')
          .attr('fill-opacity', 0.58).attr('stroke-width', 1);
      }
    });
  });

  document.querySelector(`.chip[data-id="${selectedId}"]`)?.classList.remove('active');
  if (selectedId === id) {
    selectedId = null;
    document.getElementById('sel-label').textContent = '';
    return;
  }
  selectedId = id;
  document.querySelector(`.chip[data-id="${id}"]`)?.classList.add('active');
  document.getElementById('sel-label').textContent = `District ${parseInt(id)} selected`;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape' && selectedId) selectDistrict(selectedId); });

function setMode(m) {
  currentMode = m;
  document.getElementById('btn-select').classList.toggle('active', m === 'select');
  document.getElementById('btn-lens').classList.toggle('active', m === 'lens');

  const proposedPanel = document.getElementById('panel-proposed');
  proposedPanel.classList.toggle('lens-active', m === 'lens');
  document.getElementById('hint-proposed').style.opacity = m === 'lens' ? '1' : '0';

  if (m === 'select') {
    document.getElementById('lens-card-proposed').classList.remove('show');
    clearLens();
  }

  if (maps['proposed']) {
    if (m === 'lens') {
      maps['proposed'].svg.on('.zoom', null);
    } else {
      maps['proposed'].svg.call(maps['proposed'].zoom);
      maps['proposed'].svg.on('click.bg', () => { if (selectedId) selectDistrict(selectedId); });
    }
  }
  if (maps['current']) {
    maps['current'].svg.call(maps['current'].zoom);
    maps['current'].svg.on('click.bg', () => { if (m === 'select' && selectedId) selectDistrict(selectedId); });
  }
}

const LENS_R = 90;
const RACE_COLORS = { white:'#3a6eb8', black:'#c44040', hispanic:'#3aaa60', asian:'#c47a18', other:'#7a60aa' };

function clearLens() { d3.select('#lens-svg-proposed').selectAll('*').remove(); }

function drawLens(x, y, W, H) {
  const lsvg = d3.select('#lens-svg-proposed');
  lsvg.selectAll('*').remove();
  const defs = lsvg.append('defs');
  const mask = defs.append('mask').attr('id', 'lens-mask-proposed');
  mask.append('rect').attr('width', W).attr('height', H).attr('fill', 'white');
  mask.append('circle').attr('cx', x).attr('cy', y).attr('r', LENS_R).attr('fill', 'black');
  lsvg.append('rect').attr('width', W).attr('height', H)
    .attr('fill', 'rgba(220,215,204,0.4)').attr('mask', 'url(#lens-mask-proposed)');
  lsvg.append('circle').attr('class','lens-ring').attr('cx',x).attr('cy',y).attr('r',LENS_R);
  lsvg.append('line').attr('class','lens-crosshair')
    .attr('x1',x-LENS_R+14).attr('y1',y).attr('x2',x+LENS_R-14).attr('y2',y);
  lsvg.append('line').attr('class','lens-crosshair')
    .attr('x1',x).attr('y1',y-LENS_R+14).attr('x2',x).attr('y2',y+LENS_R-14);
}

function buildCard(id) {
  const d = DIST_DATA[id]; if (!d) return '';
  const n = parseInt(id);
  const tv25 = d.gov25dem+d.gov25rep, tv24 = d.pres24dem+d.pres24rep;
  const dp25=(d.gov25dem/tv25*100).toFixed(1), rp25=(d.gov25rep/tv25*100).toFixed(1);
  const dp24=(d.pres24dem/tv24*100).toFixed(1), rp24=(d.pres24rep/tv24*100).toFixed(1);
  const races=[['White',d.white,RACE_COLORS.white],['Black',d.black,RACE_COLORS.black],
    ['Hispanic',d.hispanic,RACE_COLORS.hispanic],['Asian',d.asian,RACE_COLORS.asian],
    ['Other',d.other,RACE_COLORS.other]];
  return `
    <div class="lc-head"><span class="lc-title">District ${n}</span><span class="lc-pop">Pop: ${d.total.toLocaleString()}</span></div>
    <div class="lc-sec">Racial Composition</div>
    ${races.map(([l,p,c])=>`<div class="race-row"><span class="race-lbl">${l}</span><div class="race-track"><div class="race-fill" style="width:${p}%;background:${c}"></div></div><span class="race-pct">${p.toFixed(1)}%</span></div>`).join('')}
    <div class="divider"></div>
    <div class="lc-sec">2025 Governor</div>
    <div class="elex-row"><div class="vote-box d"><div class="vb-party">DEM</div><div class="vb-votes">${d.gov25dem.toLocaleString()}</div><div class="vb-pct">${dp25}%</div></div><div class="vote-box r"><div class="vb-party">REP</div><div class="vb-votes">${d.gov25rep.toLocaleString()}</div><div class="vb-pct">${rp25}%</div></div></div>
    <div class="lc-sec" style="margin-top:5px">2024 Presidential</div>
    <div class="elex-row"><div class="vote-box d"><div class="vb-party">DEM</div><div class="vb-votes">${d.pres24dem.toLocaleString()}</div><div class="vb-pct">${dp24}%</div></div><div class="vote-box r"><div class="vb-party">REP</div><div class="vb-votes">${d.pres24rep.toLocaleString()}</div><div class="vb-pct">${rp24}%</div></div></div>`;
}

function positionCard(card, x, y, panelW, panelH) {
  const cw=220, ch=320, mg=12;
  let cx = x + LENS_R + mg, cy = y - ch/2;
  if (cx+cw > panelW-mg) cx = x - LENS_R - cw - mg;
  if (cy < mg) cy = mg;
  if (cy+ch > panelH-mg) cy = panelH-ch-mg;
  card.style.left = cx+'px'; card.style.top = cy+'px';
}

function setupLens() {
  const overlay = document.getElementById('lens-svg-proposed');
  const card = document.getElementById('lens-card-proposed');
  const hint = document.getElementById('hint-proposed');
  let lastId = null;

  overlay.addEventListener('mousemove', e => {
    if (currentMode !== 'lens') return;
    const rect = overlay.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    drawLens(x, y, rect.width, rect.height);
    const m = maps['proposed']; if (!m) return;
    const transform = d3.zoomTransform(m.svgEl);
    const [sx, sy] = transform.invert([x, y]);
    const coords = m.projection.invert([sx, sy]);
    let found = null;
    if (coords) {
      for (const feat of m.geoData.features) {
        if (d3.geoContains(feat, coords)) { found = feat.properties.district; break; }
      }
    }
    if (found !== lastId) {
      lastId = found;
      if (found) { card.innerHTML = buildCard(found); card.classList.add('show'); hint.style.opacity = '0'; }
      else { card.classList.remove('show'); hint.style.opacity = '1'; }
    }
    if (found) positionCard(card, x, y, rect.width, rect.height);
  });

  overlay.addEventListener('mouseleave', () => {
    clearLens(); card.classList.remove('show'); lastId = null;
    if (currentMode === 'lens') hint.style.opacity = '1';
  });
}

const tooltip = document.getElementById('tooltip');
function showTooltip(e, text) { tooltip.textContent=text; tooltip.style.display='block'; moveTooltip(e); }
function moveTooltip(e) { tooltip.style.left=(e.clientX+12)+'px'; tooltip.style.top=(e.clientY-28)+'px'; }
function hideTooltip() { tooltip.style.display='none'; }

const chipsEl = document.getElementById('chips');
for (let i=1; i<=11; i++) {
  const id = String(i).padStart(2,'0');
  const chip = document.createElement('span');
  chip.className='chip'; chip.dataset.id=id; chip.textContent=`D${i}`;
  chip.addEventListener('click', () => { if (currentMode==='select') selectDistrict(id); });
  chipsEl.appendChild(chip);
}

window.addEventListener('load', () => {
  initMap('current', CURRENT_GEO);
  initMap('proposed', PROPOSED_GEO);
  setupLens();
  setMode('lens');
});

window.addEventListener('resize', () => {
  ['current','proposed'].forEach(side => {
    if (!maps[side]) return;
    const el = maps[side].svgEl;
    const W = el.clientWidth, H = el.clientHeight;
    maps[side].svg.select('rect').attr('width',W).attr('height',H);
    maps[side].projection.fitSize([W,H], maps[side].geoData);
    maps[side].g.selectAll('path').attr('d', maps[side].path);
    const fs = getLabelSize();
    maps[side].g.selectAll('text')
      .attr('x', d => maps[side].path.centroid(d)[0])
      .attr('y', d => maps[side].path.centroid(d)[1])
      .attr('font-size', fs + 'px');
  });
});
